<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>The Bridge | Inner Sanctum</title>
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="others.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/quill-cursors@3.1.0/dist/quill-cursors.css" rel="stylesheet">
</head>
<body>

    <div class="app-background">
        <div class="app-shell" id="appShell" style="display: none;"> <nav class="glass-sidebar">
                <div class="sidebar-header">
                    <div class="status-indicator">
                        <span class="pulse-dot"></span> <span id="partnerStatusText">Securing Node...</span>
                    </div>
                </div>

                <div class="nav-menu">
                    <button data-tip="Loving can hurt" class="nav-item active" onclick="loadView('overview')">✨ Overview</button>
                    <button data-tip="Take collaborative notes" class="nav-item" onclick="loadView('journal')">
    📓 SyncSpace
    <div id="sidebarUnreadBadge" class="sidebar-badge"></div>
</button>
<button data-tip="Watch Something together" class="nav-item active" onclick="loadView('cinema')">Cinema</button>

                    <button class="nav-item" onclick="loadView('tracker')">⏳ Logistics</button>
                    <button data-tip="Have unlimited chats" class="nav-item" onclick="loadView('messages')"> 💬 Messages <span id="messagesNavBadge" style="display:none; background:#ff2a5f; color:white; font-size:10px; padding:2px 6px; border-radius:10px; margin-left:auto; font-weight:bold;">0</span></button>
                    <button data-tip="Special Moments" class="nav-item" onclick="alert('Vault Firebase Storage coming soon!')">🔒 The Vault</button>
                    
                   <button data-tip="Play music together" class="nav-item" onclick="loadView('music')" style="display: flex; align-items: center;">
    <div class="sidebar-eq" id="sidebarMusicEq">
        <div class="s-bar"></div><div class="s-bar"></div><div class="s-bar"></div>
    </div>
    TwinTunes
</button>
                </div>

                <div class="sidebar-footer">
                    <button class="logout-btn" onclick="executeLogout()">🚪 Disconnect</button>
                </div>
            </nav>

            <main id="mainAppContent" class="dynamic-content-area">
                </main>
        </div>
        
        <div id="loadingCore" style="color: white; text-align: center;">
            <h1 style="font-size: 50px; animation: pulse 1.5s infinite;">📡</h1>
            <p style="color: #8e8e93;">Decrypting Bridge Payload...</p>
        </div>
    </div>
<div id="mapModal" class="glass-modal">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="mapTitle">Live Telemetry</h3>
            <button class="close-btn" onclick="closeMap()">×</button>
        </div>
        <div id="mapFrameContainer" class="map-container">
            </div>
    </div>
    
</div>
<div id="activeCallOverlay" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(10, 10, 15, 0.9); backdrop-filter: blur(50px) saturate(200%); z-index: 9999999; display: none; flex-direction: column; align-items: center; justify-content: center; font-family: 'Poppins', sans-serif; transition: all 0.4s ease; opacity: 0;">
        
        <audio id="localAudio" autoplay muted></audio>
        <audio id="remoteAudio" autoplay></audio>

        <div style="text-align: center; margin-bottom: 40px; position: absolute; top: 10%;">
            <h2 id="callStatusText" style="color: white; font-size: 28px; font-weight: 700; margin-bottom: 5px; letter-spacing: 1px;">Calling...</h2>
            <p id="callPartnerName" style="color: #ff2a5f; font-size: 16px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 15px;"></p>
            <div style="display: flex; flex-direction: column; align-items: center; gap: 8px;">
                <span id="callTimerDisplay" style="color: rgba(255,255,255,0.7); font-size: 18px; font-weight: 500; font-variant-numeric: tabular-nums; display: none;">00:00</span>
                <span id="recordingIndicator" style="background: rgba(255, 59, 48, 0.2); color: #ff3b30; border: 1px solid rgba(255, 59, 48, 0.5); padding: 4px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; display: none; animation: blink 1.5s infinite;">🔴 Recording</span>
            </div>
        </div>

        <div id="callAvatarContainer" style="width: 160px; height: 160px; border-radius: 50%; background: linear-gradient(135deg, #2a2a30, #121215); display: flex; justify-content: center; align-items: center; font-size: 65px; box-shadow: 0 0 50px rgba(255, 42, 95, 0.3); border: 2px solid rgba(255,42,95,0.5); position: relative; animation: pulseCall 2s infinite alternate;">
            👻
        </div>

        <div id="callDock" style="position: absolute; bottom: 10%; display: flex; gap: 20px; background: rgba(255,255,255,0.05); padding: 15px 25px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(20px);">
            
            <button id="answerCallBtn" style="width: 60px; height: 60px; border-radius: 50%; border: none; background: #32d74b; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 10px 25px rgba(50, 215, 75, 0.4); display: none; transition: all 0.2s;" onclick="window.answerCall()">📞</button>
            
            <button id="muteCallBtn" class="call-action-btn" data-tip="Mute Mic" onclick="window.toggleCallMute()" style="display: none;">🎙️</button>
            <button id="recordCallBtn" class="call-action-btn" data-tip="Record Call" onclick="window.toggleCallRecording()" style="display: none;">⏺️</button>
            
            <button id="hangupCallBtn" style="width: 60px; height: 60px; border-radius: 50%; border: none; background: #ff3b30; color: white; font-size: 24px; cursor: pointer; box-shadow: 0 10px 25px rgba(255, 59, 48, 0.4); transition: all 0.2s;" onclick="window.hangUpCall()">☎️</button>
        </div>

        <style>
            @keyframes pulseCall { 0% { transform: scale(1); box-shadow: 0 0 20px rgba(255, 42, 95, 0.3); } 100% { transform: scale(1.05); box-shadow: 0 0 70px rgba(255, 42, 95, 0.7), 0 0 120px rgba(255, 42, 95, 0.2); } }
            @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
            .call-action-btn { width: 60px; height: 60px; border-radius: 50%; border: 1px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.1); color: white; font-size: 20px; cursor: pointer; transition: all 0.2s; display: flex; justify-content: center; align-items: center; }
            .call-action-btn:hover { background: rgba(255,255,255,0.2); transform: translateY(-3px); }
            .call-action-btn.active { background: white; color: black; box-shadow: 0 0 20px rgba(255,255,255,0.5); }
        </style>
    </div>

<div id="callHistoryModal" class="glass-modal">
        <div class="modal-content" style="max-width: 400px; padding: 25px;">
            <div class="modal-header" style="margin-bottom: 20px;">
                <h3 style="margin:0; font-size: 20px; font-weight: 800; display: flex; align-items: center; gap: 8px;">⏱️ Call History</h3>
                <div style="display: flex; gap: 12px; align-items: center;">
                    <button class="pro-btn" data-tip="Delete all logs" style="padding: 6px 12px; font-size: 11px; background: rgba(255, 59, 48, 0.15); color: #ff3b30; border-radius: 8px; border: 1px solid rgba(255,59,48,0.3);" onclick="window.clearAllCallHistory()">Clear All</button>
                    <button class="close-btn" onclick="document.getElementById('callHistoryModal').classList.remove('active')">×</button>
                </div>
            </div>
            <div id="callHistoryList" style="max-height: 400px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 5px;">
                </div>
        </div>
    </div><script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/quill-cursors@3.1.0/dist/quill-cursors.min.js"></script>
    <script type="module" src="dashboardLogic.js"></script>
    <script src="global.js"></script>
</body>
</html>
